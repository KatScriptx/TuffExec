name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-src: 'https://github.com/theos/theos'
          theos-sdks: 'https://github.com/theos/sdks'

      - name: Build Tweak
        run: |
          # 1. Build the dylib
          make all FINALPACKAGE=1 TWEAK_NAME=TuffExec
          
          # 2. Create an output folder
          mkdir -p final_output
          cp .theos/obj/TuffExec.dylib final_output/
          
          # 3. Robust Search for libsubstrate.dylib
          # This looks through the entire Theos folder for the file automatically
          SUBSTRATE_PATH=$(find $THEOS -name "libsubstrate.dylib" | head -n 1)
          
          if [ -f "$SUBSTRATE_PATH" ]; then
            echo "Found substrate at: $SUBSTRATE_PATH"
            cp "$SUBSTRATE_PATH" final_output/
          else
            echo "Warning: libsubstrate.dylib not found in Theos folder."
            echo "You may need to download it manually for ESign."
          fi

      - name: Upload Sideload Pack
        uses: actions/upload-artifact@v4
        with:
          name: TuffExec-Sideload-Pack
          path: final_output/*
