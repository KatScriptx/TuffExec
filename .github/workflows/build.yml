name: Build TuffExec

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          # THESE ARE THE FULL, UNEDITED REPOSITORY PATHS:
          theos-src: 'https://github.com/theos/theos'
          theos-sdks: 'https://github.com/theos/sdks'

      - name: Build and Package
        run: |
          # 1. Compile the TuffExec code
          make all FINALPACKAGE=1 TWEAK_NAME=TuffExec
          
          # 2. Create the output folder for ESign
          mkdir -p final_output
          cp .theos/obj/TuffExec.dylib final_output/TuffExec.dylib
          
          # 3. DOWNLOAD THE RAW SUBSTRATE (FULL BISHOPFOX RAW LINK)
          # Note: We use /raw/ instead of /blob/ so the runner gets the BINARY, not the WEBSITE
          curl -L "https://github.com/BishopFox/theos-jailed/raw/master/lib/libsubstrate.dylib" -o final_output/libsubstrate.dylib

      - name: Upload Sideload Pack
        uses: actions/upload-artifact@v4
        with:
          name: TuffExec-Sideload-Pack
          path: final_output/
