name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-src: 'https://github.com'
          theos-sdks: 'https://github.com'

      - name: Build Dylib
        run: |
          make all FINALPACKAGE=1 TWEAK_NAME=TuffExec

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TuffExec-Dylib
          path: .theos/obj/TuffExec.dylib
