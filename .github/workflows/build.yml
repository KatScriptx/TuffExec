name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-src: 'https://github.com/theos/theos'
          theos-sdks: 'https://github.com/theos/sdks'
          theos-sdks-branch: 'master'

      - name: Build Tweak
        run: |
          # 1. Compile the tweak for sideloading
          make all FINALPACKAGE=1 TWEAK_NAME=TuffExec
          
          # 2. Create an output folder for ESign
          mkdir -p final_output
          cp .theos/obj/TuffExec.dylib final_output/
          
          # 3. Locate and copy libsubstrate.dylib from the Theos environment
          # Theos stores these in vendor/lib or lib depending on the version
          if [ -d "$THEOS/vendor/lib" ]; then
            cp "$THEOS/vendor/lib/libsubstrate.dylib" final_output/
          else
            cp "$THEOS/lib/libsubstrate.dylib" final_output/
          fi

      - name: Upload Sideload Pack
        uses: actions/upload-artifact@v4
        with:
          name: TuffExec-Sideload-Pack
          # This uploads BOTH dylibs in one zip
          path: final_output/*
